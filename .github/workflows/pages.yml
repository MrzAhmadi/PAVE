name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'webapp/**'
      - 'results/merged/results.csv'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site artifact
        run: |
          mkdir -p _site/results/merged
          # Copy webapp files to site root
          cp -r webapp/. _site/
          # Copy CSV data so the app can fetch it via relative URL
          cp results/merged/results.csv _site/results/merged/results.csv
          # Prevent Jekyll from interfering
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

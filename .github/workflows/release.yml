name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:

  # ── 1. Build wheel + sdist ───────────────────────────────────────────────────
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract version from tag
        id: ver
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml

      - name: Build wheel and sdist
        run: pip install build && python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── 2. Build .deb, .rpm, .tar.gz ─────────────────────────────────────────────
  packages:
    name: Build OS packages
    needs: build
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.build.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install nfpm
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' \
            | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update -q
          sudo apt-get install -q -y nfpm

      - name: Build .deb
        run: nfpm pkg --config packaging/nfpm.yaml --packager deb --target dist/
        env:
          PAVE_VERSION: ${{ env.VERSION }}

      - name: Build .rpm
        run: nfpm pkg --config packaging/nfpm.yaml --packager rpm --target dist/
        env:
          PAVE_VERSION: ${{ env.VERSION }}

      - name: Build .tar.gz
        run: |
          DIR="pave-${VERSION}"
          mkdir -p "${DIR}"
          cp dist/pave_proxy-*.whl "${DIR}/pave_proxy.whl"
          cp packaging/install.sh "${DIR}/install.sh"
          chmod +x "${DIR}/install.sh"
          cp README.md "${DIR}/"
          tar -czf "dist/pave-${VERSION}-linux.tar.gz" "${DIR}/"

      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz

  # ── 3. Create GitHub Release ─────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build, packages]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: packages
          path: dist/

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/pave_proxy-*.whl
            dist/pave-*.tar.gz
            dist/pave_*.deb
            dist/pave-*.rpm
